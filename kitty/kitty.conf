font_family      BitstromWera Nerd Font Mono
font_size        11.0

background_opacity 0.92
window_padding_width 8
confirm_os_window_close 0

# Colors come from theme.conf (symlinked by theme-switch.sh). Remote control
# is needed so theme-switch.sh can force a reload: kitty's inotify watch on
# theme.conf goes stale once the symlink itself is replaced (ln -sf swaps the
# inode), so reload_config_on_change alone never fires after the first switch.
include theme.conf

allow_remote_control socket-only
listen_on unix:/tmp/kitty-{kitty_pid}

shell fish

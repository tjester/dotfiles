#
# Hyprland config — hand-written, minimal core.
# Docs: https://wiki.hyprland.org
#

source = ~/.config/hypr/monitors.conf

# ---- Autostart ----
exec-once = waybar
exec-once = swaync
exec-once = hyprpaper
exec-once = hypridle
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = wl-paste --watch cliphist store
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = hyprctl setcursor Bibata-Modern-Ice 24

# ---- Environment ----
env = XCURSOR_SIZE,24
env = XCURSOR_THEME,Bibata-Modern-Ice

# ---- Input ----
input {
    kb_layout = us
    follow_mouse = 1
    touchpad {
        natural_scroll = false
    }
    sensitivity = 0
}

# ---- General ----
general {
    gaps_in = 4
    gaps_out = 8
    border_size = 2
    col.active_border = rgba(b4befeff) rgba(cba6f7ff) 45deg
    col.inactive_border = rgba(45475aaa)
    layout = dwindle
    resize_on_border = true
}

decoration {
    rounding = 8

    active_opacity = 1.0
    inactive_opacity = 0.95

    shadow {
        enabled = true
        range = 12
        render_power = 3
        color = rgba(11111bcc)
    }

    blur {
        enabled = true
        size = 4
        passes = 2
        vibrancy = 0.1696
    }
}

animations {
    enabled = true

    bezier = easeOutQuint,0.23,1,0.32,1
    bezier = easeInOutCubic,0.65,0.05,0.36,1

    animation = windows, 1, 4, easeOutQuint
    animation = windowsOut, 1, 4, easeOutQuint, popin 80%
    animation = border, 1, 8, default
    animation = fade, 1, 3, default
    animation = workspaces, 1, 4, easeInOutCubic, slide
}

dwindle {
    preserve_split = true
}

master {
    new_status = master
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    force_default_wallpaper = 0
}

# ---- Keybindings ----
$mainMod = SUPER
$terminal = kitty
$launcher = rofi -show drun

bindd = $mainMod, Return, Open terminal, exec, $terminal
bindd = $mainMod, Q, Close window, killactive,
bindd = $mainMod SHIFT, Q, Exit Hyprland, exit,
bindd = $mainMod, Space, App launcher, exec, $launcher
bindd = $mainMod, V, Toggle floating, togglefloating,
bindd = $mainMod, F, Toggle fullscreen, fullscreen,
bindd = $mainMod, P, Toggle pseudotile, pseudo,
bindd = $mainMod, L, Lock screen, exec, hyprlock
bindd = $mainMod, slash, Show this keybind list, exec, ~/.config/hypr/scripts/show-keybinds.sh

# Clipboard history
bindd = $mainMod, C, Clipboard history, exec, cliphist list | rofi -dmenu | cliphist decode | wl-copy

# Screenshots
bindd = , Print, Screenshot region, exec, grim -g "$(slurp)" - | wl-copy
bindd = SHIFT, Print, Screenshot full screen, exec, grim - | wl-copy

# Move focus
bindd = $mainMod, left, Move focus (arrows), movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Move window
bindd = $mainMod SHIFT, left, Move window (SHIFT + arrows), movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

# Workspaces 1-10
bindd = $mainMod, 1, Switch workspace (1-0), workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bindd = $mainMod SHIFT, 1, Move window to workspace (SHIFT + 1-0), movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

bindd = $mainMod, S, Toggle scratchpad, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Mouse move/resize windows
bindmd = $mainMod, mouse:272, Drag window with mouse, movewindow
bindmd = $mainMod, mouse:273, Resize window with mouse, resizewindow

# Media / volume / brightness
bindeld = ,XF86AudioRaiseVolume, Volume up, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindeld = ,XF86AudioMute, Mute audio, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindeld = ,XF86MonBrightnessUp, Brightness up, exec, brightnessctl set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl set 5%-
bindld = ,XF86AudioPlay, Media play/pause, exec, playerctl play-pause
bindl = ,XF86AudioNext, exec, playerctl next
bindl = ,XF86AudioPrev, exec, playerctl previous

# Notification center
bindd = $mainMod, N, Notification center, exec, swaync-client -t -sw

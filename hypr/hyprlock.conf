general {
    hide_cursor = false
}

background {
    monitor =
    path = ~/.local/share/wallpapers/nordic-wallpaper.jpg
    blur_passes = 2
    blur_size = 7
}

input-field {
    monitor =
    size = 250, 60
    outline_thickness = 3
    dots_size = 0.26
    dots_spacing = 0.35
    outer_color = rgb(180, 190, 254)
    inner_color = rgb(30, 30, 46)
    font_color = rgb(205, 214, 244)
    fade_on_empty = true
    placeholder_text = <i>Password...</i>
    position = 0, -20
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = rgba(205, 214, 244, 1.0)
    font_size = 90
    font_family = BitstromWera Nerd Font
    position = 0, 200
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%A, %d %B")"
    color = rgba(186, 194, 222, 1.0)
    font_size = 22
    font_family = BitstromWera Nerd Font
    position = 0, 120
    halign = center
    valign = center
}
